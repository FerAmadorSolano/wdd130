<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet">
</head>

<body>

    <main class="box">
        <h1>✔️ Basic HTML and CSS Quiz</h1>
        <form action="">
            <div class="quiz-item box">
                <label for="q1">1. What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1" .required>
            </div>

            <div class="quiz-item box">
                <label for="q2">2. How are id and class attributes selected in CSS?</label>
                <textarea id="q2" name="q2"> </textarea>
            </div>

            <div class="quiz-item box">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose one...</option>
                    <option value="a">A. &lt;!--This is a comment -- &gt;</option>
                    <option value="b">A. &lt;/* This is a comment */ &gt;</option>
                    <option value="a">A. &lt;// This is a comment // &gt;</option>
                </select>
            </div>

            <div class="quiz-item box">
                <label for="q4">4. What is the bottom margin given this declaration? </label>
                <code class="box">margin: 10px 5px 15px;</code>
                <input type="text" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz fot Grading</button>
        </form>
    </main>

    <footer>
        <p>©️2026 | HTML Form - User Poll Activity | Fernanda Amador </p>
    </footer>
    </footer>
</body>

</html>
