<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact RapidRush Rafting for bookings, questions, or trip information. Our team is ready to help you plan your next adventure.">
    <meta name="author" content="Fernanda Amador Solano">
    <title>Contact Us | RapidRush Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <!--Company information-->
        <div class="company-info">
            <h2>RapidRush Rafting Company</h2>
            <p>Bugambilia 9, Acueducto Animas
            <p>Xalapa, Veracruz</p>
            <p>+52 229 252 2465</p>
            <p>info@rapidrush.com</p>
        </div>

        <!--Google Map and Form-->
        <div class="second-section">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1886.1111946556866!2d-96.87945919484123!3d19.519524134332237!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85db32329377b13f%3A0x788ec2e83504ca32!2sBugambilias%209%2C%20Acueducto%20Animas%2C%2091197%20Xalapa-Enr%C3%ADquez%2C%20Ver.!5e0!3m2!1ses-419!2smx!4v1775338906328!5m2!1ses-419!2smx"
                  width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form-user">
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <p>Message Purpose:</p>
                    <label><input type="radio" name="purpose" value="general" required> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation">
                        Reservation</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Suggestion</label>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <label>
                        <input type="checkbox" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </div>

        <!--Employees-->
        <div class="employees">
            <div class="columns">
                <h2>We Are Here to Serve You</h2>
            </div>

            <figure>
                <img src="images/employee1.jpg" alt="Rafting guide smiling">
                <figcaption>Maria - Lead Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="Rafting instructor with gear">
                <figcaption>Juan - Safety Expert</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="Team coordinator">
                <figcaption>Ana - Trip Coordinator</figcaption>
            </figure>

        </div>

    </main>

    <footer>
        <p>©️2026 | 🦋 RapidRush Rafting 🦋 | Fernanda Amador </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Facebook Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
